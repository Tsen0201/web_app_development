{% extends "base.html" %}

{% block title %}分類管理 — 任務管理系統{% endblock %}

{% block content %}
<div class="row justify-content-center">
    <div class="col-lg-8">
        <h1 class="h3 mb-4">
            <i class="bi bi-tags me-2 text-primary"></i>分類管理
        </h1>

        <!-- 新增分類 -->
        <div class="card shadow-sm mb-4">
            <div class="card-header bg-white fw-semibold">
                <i class="bi bi-plus-circle me-1"></i>新增分類
            </div>
            <div class="card-body">
                <form method="POST" action="{{ url_for('categories.create_category') }}" class="d-flex gap-2">
                    <input type="text" class="form-control" name="name"
                           placeholder="輸入新分類名稱（例如：工作、日常、休閒）" required>
                    <button type="submit" class="btn btn-primary text-nowrap">
                        <i class="bi bi-plus-lg me-1"></i>新增
                    </button>
                </form>
            </div>
        </div>

        <!-- 分類列表 -->
        <div class="card shadow-sm">
            <div class="card-header bg-white fw-semibold">
                <i class="bi bi-list-ul me-1"></i>現有分類
            </div>
            {% if categories %}
                <ul class="list-group list-group-flush">
                    {% for cat in categories %}
                        <li class="list-group-item d-flex justify-content-between align-items-center">
                            <div>
                                <i class="bi bi-tag-fill text-info me-2"></i>
                                <span class="fw-semibold">{{ cat.name }}</span>
                                <small class="text-muted ms-2">
                                    建立於 {{ cat.created_at[:10] }}
                                </small>
                            </div>
                            <form method="POST"
                                  action="{{ url_for('categories.delete_category', category_id=cat.id) }}"
                                  onsubmit="return confirm('確定要刪除「{{ cat.name }}」分類嗎？\n該分類下的任務不會被刪除，只會移除分類標籤。')">
                                <button type="submit" class="btn btn-outline-danger btn-sm" title="刪除分類">
                                    <i class="bi bi-trash"></i>
                                </button>
                            </form>
                        </li>
                    {% endfor %}
                </ul>
            {% else %}
                <div class="card-body text-center text-muted py-4">
                    <i class="bi bi-tags display-4"></i>
                    <p class="mt-2 mb-0">尚無分類，請在上方新增。</p>
                </div>
            {% endif %}
        </div>
    </div>
</div>
{% endblock %}
